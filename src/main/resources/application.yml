server:
  port: 8080
  servlet:
    context-path: /

spring:
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  mail:
    host: smtp.163.com
    port: 465
    username: xxx
    password: xxx
    default-encoding: UTF-8
    properties:
      mail.smtp.auth: true
      mail.smtp.ssl.enable: true
      mail.smtp.ssl.trust: smtp.163.com
      mail.smtp.connectiontimeout: 15000
      mail.smtp.timeout: 15000
      mail.smtp.writetimeout: 15000
# 如果上面 465 端口超时，注释掉上面 properties，改用下面 587 端口配置:
#    port: 587
#    properties:
#      mail.smtp.auth: true
#      mail.smtp.starttls.enable: true
#      mail.smtp.starttls.required: true
#      mail.smtp.connectiontimeout: 15000
#      mail.smtp.timeout: 15000
#      mail.smtp.writetimeout: 15000
  sql:
    init:
      mode: never
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: 123456
      database: 0
      lettuce:
        shutdown-timeout: 10000
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 100
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/travel
    username: root
    password: 123456
  servlet:
    multipart:
      max-file-size: 1024MB
      max-request-size: 1024MB
      enabled: true

mybatis-plus:
  mapper-locations: "classpath*:/mapper/**/*.xml" # Mapper.xml 文件扫描路径
  type-aliases-package: com.travel.entity
  global-config:
    db-config:
      id-type: auto # 主键 id 自增
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
    map-underscore-to-camel-case: true

# 旅游网站自定义配置
travel:
  # token 配置
  token:
    user-prefix: "travel:token:user:"
    admin-prefix: "travel:token:admin:"
    expire: 604800 # 7天(秒)
  # 阿里云 OSS（请按需填写真实配置）
  aliyun:
    oss:
      endpoint: "xxx"
      access-key-id: "xxx"
      access-key-secret: "xxx"
      bucket-name: "xxx"